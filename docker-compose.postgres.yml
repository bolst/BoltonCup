# BoltonCup PostgreSQL (standalone)
#
# Usage:
#   docker compose -f docker-compose.postgres.yml up -d
#   docker compose -f docker-compose.postgres.yml down
#   docker compose -f docker-compose.postgres.yml down -v   # also deletes the data volume

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bcadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-boltoncup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bcadmin}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
