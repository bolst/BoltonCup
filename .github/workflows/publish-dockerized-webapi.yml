name: BoltonCup.WebAPI Docker Image CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/BoltonCup.WebAPI/**'
  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run tests
      run: dotnet test tests/BoltonCup.WebAPI.Tests/BoltonCup.WebAPI.Tests.csproj --configuration Release --verbosity normal

  build:

    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push (attempt 1)
      id: build_push_attempt_1
      continue-on-error: true
      uses: docker/build-push-action@v7
      with:
        context: ./src
        file: src/BoltonCup.WebAPI/Dockerfile
        push: true
        tags: bolst/boltoncup-webapi:latest

    - name: Wait before retry
      if: steps.build_push_attempt_1.outcome == 'failure'
      run: sleep 20

    - name: Build and push (attempt 2)
      id: build_push_attempt_2
      if: steps.build_push_attempt_1.outcome == 'failure'
      continue-on-error: true
      uses: docker/build-push-action@v7
      with:
        context: ./src
        file: src/BoltonCup.WebAPI/Dockerfile
        push: true
        tags: bolst/boltoncup-webapi:latest

    - name: Wait before final retry
      if: steps.build_push_attempt_2.outcome == 'failure'
      run: sleep 40

    - name: Build and push (attempt 3)
      id: build_push_attempt_3
      if: steps.build_push_attempt_2.outcome == 'failure'
      continue-on-error: true
      uses: docker/build-push-action@v7
      with:
        context: ./src
        file: src/BoltonCup.WebAPI/Dockerfile
        push: true
        tags: bolst/boltoncup-webapi:latest

    - name: Ensure build succeeded
      if: steps.build_push_attempt_1.outcome == 'failure' && steps.build_push_attempt_2.outcome == 'failure' && steps.build_push_attempt_3.outcome == 'failure'
      run: |
        echo "Docker build and push failed after 3 attempts."
        exit 1

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Droplet
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: root
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        script: |
          cd /opt/BoltonCup
          docker compose -f ./docker/webapi.yml --env-file .env pull
          docker compose -f ./docker/webapi.yml --env-file .env up -d
