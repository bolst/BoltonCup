name: BoltonCup.WebAPI Docker Image CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/BoltonCup.WebAPI/**'
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: ./src
        file: src/BoltonCup.WebAPI/Dockerfile
        push: true
        tags: bolst/boltoncup-webapi:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to Droplet
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: root
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        script: |
          cd /opt/boltoncup
          docker compose -f ./docker/webapi.yml --env-file .env pull
          docker compose -f ./docker/webapi.yml --env-file .env up -d
