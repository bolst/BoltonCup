# BoltonCup WebAPI
#
# Usage:
#   cp .env.example .env       # then fill in CONNECTION_STRING + secrets
#   docker compose up -d
#   docker compose down

services:
  webapi:
    image: bolst/boltoncup-webapi:${WEBAPI_TAG:-latest}
    container_name: boltoncup-webapi-1
    restart: unless-stopped
    ports:
      - "${WEBAPI_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: Warning
      BoltonCup__ConnectionString: ${CONNECTION_STRING:?required}
      BoltonCup__AdminEmail: ${ADMIN_EMAIL:-}
      BoltonCup__Authentication__AdminApiKey: ${ADMIN_API_KEY:-}
      BoltonCup__Authentication__AdminAccountId: ${ADMIN_ACCOUNT_ID:-}
      # Admin key is rejected outside these networks. Defaults to the Tailscale tailnet only; override if needed.
      # BoltonCup__Authentication__AdminApiKeyAllowedNetworks__0: 100.64.0.0/10
      Stripe__ApiKey: ${STRIPE_API_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      CloudflareR2__AccountId: ${R2_ACCOUNT_ID:-}
      CloudflareR2__AccessKey: ${R2_ACCESS_KEY:-}
      CloudflareR2__SecretKey: ${R2_SECRET_KEY:-}
      CloudflareR2__BaseUrl: ${R2_BASE_URL:-https://assets.boltoncup.ca/}
      Resend__Enabled: ${RESEND_ENABLED:-false}
      Resend__ApiKey: ${RESEND_API_KEY:-}
      Resend__SenderName: ${RESEND_SENDER_NAME:-Bolton Cup}
      Resend__SenderEmail: ${RESEND_SENDER_EMAIL:-notifications@boltoncup.ca}
      Twilio__Enabled: ${TWILIO_ENABLED:-false}
      Twilio__AccountSid: ${TWILIO_ACCOUNT_SID:-}
      Twilio__AuthToken: ${TWILIO_AUTH_TOKEN:-}
      Twilio__FromPhoneNumber: ${TWILIO_FROM_PHONE_NUMBER:-}
      Sentry__Dsn: ${SENTRY_DSN:-}
      Spotify__ClientId: ${SPOTIFY_CLIENT_ID:-}
      Spotify__ClientSecret: ${SPOTIFY_CLIENT_SECRET:-}
