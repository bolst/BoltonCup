# Local dev stack — runs WebAPI and Auth with HTTPS via ASP.NET dev cert
#
# First time setup:
#   dotnet dev-certs https -ep ~/.aspnet/https/boltoncup.pfx -p devpassword
#   dotnet dev-certs https --trust
#
# Usage:
#   docker compose -f docker/webapi.yml -f docker/dev-stack.yml up -d

services:
  webapi:
    ports:
      - "${WEBAPI_HTTPS_PORT:-7159}:8081"
    volumes:
      - ${HOME}/.aspnet/https:/https:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "https://+:8081;http://+:8080"
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/boltoncup.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${CERT_PASSWORD:-devpassword}

  auth:
    build:
      context: ../src
      dockerfile: BoltonCup.Auth/Dockerfile
    ports:
      - "${AUTH_PORT:-7269}:443"
    volumes:
      - ${HOME}/.aspnet/https:/https:ro
    environment:
      CERT_PASSWORD: ${CERT_PASSWORD:-devpassword}
      BOLTONCUP_API_BASE_URL: https://localhost:7159/
      BOLTONCUP_AUTH_BASE_URL: https://localhost:7269/
      BOLTONCUP_WEB_BASE_URL: https://localhost:7266/
