# BoltonCup Docker Compose
#
# Usage:
#   docker compose up -d                      # Start PostgreSQL + WebAPI
#   docker compose --profile admin up -d      # Start PostgreSQL + WebAPI + Admin
#   docker compose down                       # Stop all services
#   docker compose down -v                    # Stop all and delete database volume
#
# First time setup:
#   cp .env.example .env
#   # Edit .env with your secrets
#   docker compose up -d

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boltoncup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-boltoncup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boltoncup}"]
      interval: 5s
      timeout: 5s
      retries: 5

  webapi:
    image: bolst/boltoncup-webapi:${WEBAPI_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEBAPI_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      BoltonCup__ConnectionString: "Host=postgres;Database=${POSTGRES_DB:-boltoncup};Username=${POSTGRES_USER:-boltoncup};Password=${POSTGRES_PASSWORD}"
      BoltonCup__AdminEmail: ${ADMIN_EMAIL:-}
      Stripe__ApiKey: ${STRIPE_API_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      CloudflareR2__AccessKey: ${R2_ACCESS_KEY:-}
      CloudflareR2__SecretKey: ${R2_SECRET_KEY:-}
      CloudflareR2__BaseUrl: ${R2_BASE_URL:-https://assets.boltoncup.ca}
      Sentry__Dsn: ${SENTRY_DSN:-}

  # Optional: include with --profile admin
  admin:
    profiles: ["admin"]
    image: bolst/boltoncup-admin:${ADMIN_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-8081}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      BoltonCup__ConnectionString: "Host=postgres;Database=${POSTGRES_DB:-boltoncup};Username=${POSTGRES_USER:-boltoncup};Password=${POSTGRES_PASSWORD}"
      BoltonCup__ApiBaseUrl: ${API_BASE_URL:-http://webapi:8080/}
      BoltonCup__AuthBaseUrl: ${AUTH_BASE_URL:-https://auth.boltoncup.ca/}
      CloudflareR2__AccessKey: ${R2_ACCESS_KEY:-}
      CloudflareR2__SecretKey: ${R2_SECRET_KEY:-}
      CloudflareR2__BaseUrl: ${R2_BASE_URL:-https://assets.boltoncup.ca}

volumes:
  postgres_data:
